version: '3.8'

services:
  rust-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8081:8081"
    environment:
      RUST_LOG: info
      RUST_BACKTRACE: 1
    volumes:
      - ./data:/app/data:ro
    networks:
      - tsi-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - rust-backend
    networks:
      - tsi-network
    restart: unless-stopped

networks:
  tsi-network:
    driver: bridge
