name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main

env:
  DEV_IMAGE_TAG: tsi-dev:ci
  DEV_CACHE_SCOPE: tsi-dev-ci

jobs:
  frontend-quality:
    name: Frontend quality gates
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: Run frontend checks
        run: |
          chmod +x scripts/ci_frontend.sh
          ./scripts/ci_frontend.sh --quality-gates

  rust:
    name: Rust checks (Docker)
    runs-on: ubuntu-latest
    needs:
      - frontend-quality

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true
          submodules: recursive

      - name: Setup Docker environment
        uses: ./.github/actions/setup-docker
        with:
          dev-image-tag: ${{ env.DEV_IMAGE_TAG }}
          dev-cache-scope: ${{ env.DEV_CACHE_SCOPE }}

      - name: Run backend checks (via scripts)
        run: |
          chmod +x scripts/*.sh
          ./scripts/ci_backend.sh standard --docker --no-bindings
