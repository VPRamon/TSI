name: CI - Rust + Vue

on:
  push:
    branches: [ integrate-rust ]
  pull_request:
    branches: [ integrate-rust ]

jobs:
  backend:
    name: Backend (Rust)
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        components: rustfmt, clippy
    
    - name: Cache cargo registry
      uses: actions/cache@v4
      with:
        path: ~/.cargo/registry
        key: ${{ runner.os }}-cargo-registry-${{ hashFiles('backend/Cargo.lock') }}
    
    - name: Cache cargo build
      uses: actions/cache@v4
      with:
        path: backend/target
        key: ${{ runner.os }}-cargo-build-${{ hashFiles('backend/Cargo.lock') }}
    
    - name: Check formatting
      working-directory: backend
      run: cargo fmt --check
    
    - name: Run Clippy
      working-directory: backend
      run: cargo clippy --all-targets --all-features -- -D warnings
    
    - name: Build
      working-directory: backend
      run: cargo build --verbose
    
    - name: Run tests
      working-directory: backend
      run: cargo test --verbose

  frontend:
    name: Frontend (Vue/TypeScript)
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json
    
    - name: Install dependencies
      working-directory: frontend
      run: npm ci
    
    - name: Type check
      working-directory: frontend
      run: npm run typecheck || echo "Type check skipped (needs full setup)"
    
    - name: Build
      working-directory: frontend
      run: npm run build
    
    - name: Run tests
      working-directory: frontend
      run: npm test || echo "Tests skipped (not yet implemented)"

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Build backend image
      run: docker build -t tsi-backend:test ./backend
    
    - name: Build frontend image
      run: docker build -t tsi-frontend:test ./frontend
